<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCoder AI | Mainframe</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="theme-default">

    <div class="scanlines"></div>

    <div class="app-container">
        <aside class="sidebar">
            <h2>📜 HISTORY</h2>
            <div id="historyList"></div>
        </aside>

        <main class="workspace">
            <header>
                <h1>GCoder AI ⚡</h1>
                <p id="subtitle">SYSTEM STANDBY...</p>
            </header>
            
            <div class="input-section">
                <select id="language">
                    <option value="C">C Language</option>
                    <option value="C++">C++</option>
                    <option value="Python">Python</option>
                    <option value="Java">Java</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="HTML/CSS">HTML/CSS</option>
                    <option value="SQL">SQL</option>
                    <option value="Go">Go (Golang)</option>
                    <option value="Rust">Rust</option>
                    <option value="TypeScript">TypeScript</option>
                </select>

                <textarea id="codeInput" placeholder="Input source code here..."></textarea>
                
                <button id="fixBtn" onclick="fixMyCode()">INITIALIZE ANALYSIS</button>
            </div>

            <div id="output" class="output-section">
                <div class="placeholder-text">AWAITING INPUT...</div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
